name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --locked
      - name: Test (excluding upstream http-types)
        run: |
          cargo test --workspace --exclude http-types
      - name: Test http-types (allowed to fail; pre-existing upstream)
        continue-on-error: true
        run: cargo test -p http-types

  deno:
    name: Governance console (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Lint
        working-directory: governance-console
        run: deno task lint
      - name: Format check
        working-directory: governance-console
        run: deno task fmt:check
      - name: Test
        working-directory: governance-console
        run: deno task test
      - name: Build
        working-directory: governance-console
        run: deno task build

  containers:
    name: Container builds
    runs-on: ubuntu-latest
    needs: [rust, deno]
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y podman
      - name: Build API image
        run: podman build -f containers/Containerfile.api -t solid-zarr-api:ci .
      - name: Build console image
        run: podman build -f containers/Containerfile.console -t governance-console:ci ./governance-console
